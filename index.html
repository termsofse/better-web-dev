<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebForge IDE</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;
  --fg:#e6edf3;--fg2:#8b949e;--fg3:#484f58;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;
  --purple:#bc8cff;--cyan:#39d2c0;
  --border:#30363d;--hover:#1f2937;
  --font:'JetBrains Mono',monospace;--ui:'Inter',sans-serif;
  --radius:6px;
}
html,body{height:100%;overflow:hidden;font-family:var(--ui);background:var(--bg);color:var(--fg);font-size:13px;line-height:1.5}
button{font-family:var(--ui);cursor:pointer;border:none;background:none;color:var(--fg);font-size:12px}
input{font-family:var(--ui);background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:4px 8px;border-radius:var(--radius);font-size:12px;outline:none}
input:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--fg2)}

/* ========== LAYOUT ========== */
#app{display:flex;height:100vh;width:100vw}
#auth-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:360px;text-align:center}
.auth-box h1{font-size:22px;font-weight:700;margin-bottom:6px}
.auth-box p{color:var(--fg2);margin-bottom:24px;font-size:13px}
.auth-box input{width:100%;padding:10px 12px;margin-bottom:12px;font-size:13px}
.auth-box .btn-primary{width:100%;padding:10px;background:var(--blue);color:#000;font-weight:600;border-radius:var(--radius);margin-bottom:8px;font-size:13px}
.auth-box .btn-primary:hover{opacity:.9}
.auth-box .btn-link{color:var(--blue);font-size:12px}
.auth-box .error{color:var(--red);font-size:12px;margin-bottom:12px}

/* SIDEBAR */
#sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;user-select:none}
#sidebar-header{padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
#sidebar-header h2{font-size:13px;font-weight:600;flex:1}
.icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--fg2);transition:.15s}
.icon-btn:hover{background:var(--bg4);color:var(--fg)}
.icon-btn svg{width:16px;height:16px}
#file-tree{flex:1;overflow-y:auto;padding:4px 0}
.tree-item{display:flex;align-items:center;padding:3px 8px;padding-left:calc(8px + var(--depth,0) * 16px);cursor:pointer;gap:6px;font-size:12px;position:relative;min-height:28px}
.tree-item:hover{background:var(--hover)}
.tree-item.active{background:var(--bg4);color:var(--blue)}
.tree-item.selected{background:rgba(88,166,255,.12)}
.tree-item.drop-target{outline:1px dashed var(--blue)}
.tree-item .icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tree-item .icon svg{width:14px;height:14px}
.tree-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-item .name input{width:100%;padding:1px 4px;font-size:12px;background:var(--bg);border-color:var(--blue)}
.tree-item .chevron{width:14px;height:14px;transition:transform .15s;color:var(--fg3)}
.tree-item .chevron.open{transform:rotate(90deg)}
.file-html .icon svg{color:#e44d26}
.file-css .icon svg{color:#264de4}
.file-js .icon svg{color:#f7df1e}
.file-json .icon svg{color:#f7df1e}
.file-img .icon svg{color:var(--green)}
.file-md .icon svg{color:var(--fg2)}
.file-folder .icon svg{color:var(--orange)}

/* SIDEBAR FOOTER */
#sidebar-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg2)}
#sidebar-footer .user-email{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#sidebar-footer button{color:var(--fg2);font-size:11px}
#sidebar-footer button:hover{color:var(--red)}

/* MAIN AREA */
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* TOOLBAR */
#toolbar{height:40px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px}
#tabs{display:flex;flex:1;overflow-x:auto;gap:2px}
.tab{display:flex;align-items:center;padding:6px 12px;font-size:12px;border-radius:var(--radius) var(--radius) 0 0;gap:6px;white-space:nowrap;color:var(--fg2)}
.tab:hover{background:var(--bg3)}
.tab.active{background:var(--bg);color:var(--fg)}
.tab .close{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;opacity:0}
.tab:hover .close,.tab.active .close{opacity:1}
.tab .close:hover{background:var(--bg4)}
#toolbar-actions{display:flex;gap:4px}
.btn-sm{padding:4px 10px;border-radius:var(--radius);font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;transition:.15s}
.btn-sm:hover{background:var(--bg4)}
.btn-sm.primary{background:var(--blue);color:#000}
.btn-sm.primary:hover{opacity:.85}

/* EDITOR + PREVIEW SPLIT */
#workspace{flex:1;display:flex;overflow:hidden}
#editor-pane{flex:1;display:flex;flex-direction:column;min-width:0}
#editor-container{flex:1;position:relative;overflow:hidden}
#code-editor{width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);font-size:13px;line-height:1.7;padding:12px;border:none;outline:none;resize:none;tab-size:2;white-space:pre;overflow:auto}
#line-numbers{position:absolute;left:0;top:0;bottom:0;width:48px;background:var(--bg);color:var(--fg3);font-family:var(--font);font-size:13px;line-height:1.7;padding:12px 8px 12px 0;text-align:right;pointer-events:none;overflow:hidden;user-select:none}
#code-editor.has-lines{padding-left:56px}
#preview-pane{width:45%;min-width:200px;border-left:1px solid var(--border);display:flex;flex-direction:column}
#preview-pane.hidden{display:none}
#preview-header{height:32px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--fg2);gap:6px}
#preview-header .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
#preview-frame{flex:1;background:#fff;border:none}

/* CONTEXT MENU */
#context-menu{position:fixed;z-index:999;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 0;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
#context-menu.show{display:block}
.ctx-item{padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.ctx-item:hover{background:var(--hover)}
.ctx-item.danger{color:var(--red)}
.ctx-item.disabled{opacity:.4;pointer-events:none}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* FULL PREVIEW OVERLAY */
#full-preview{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
#full-preview.show{display:flex}
#full-preview-bar{height:40px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px}
#full-preview iframe{flex:1;border:none;background:#fff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:380px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal .actions button{padding:6px 14px;border-radius:var(--radius);font-size:12px;font-weight:500}
.modal .actions .cancel{background:var(--bg4)}
.modal .actions .confirm{background:var(--blue);color:#000}

/* STATUS BAR */
#statusbar{height:24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--fg2);gap:16px}
.status-item{display:flex;align-items:center;gap:4px}
.saving-indicator{color:var(--green)}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>⚡ WebForge</h1>
    <p>Sign in to save your projects to the cloud</p>
    <div id="auth-error" class="error" style="display:none"></div>
    <input id="auth-email" type="email" placeholder="Email">
    <input id="auth-pass" type="password" placeholder="Password">
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>
    <button class="btn-link" id="btn-toggle-auth" onclick="toggleAuthMode()">Don't have an account? Sign up</button>
    <div style="margin-top:12px;font-size:11px;color:var(--fg3)">
      <button class="btn-link" onclick="doGuestMode()">Continue as guest (no cloud save)</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>📁 Explorer</h2>
      <button class="icon-btn" title="New file" onclick="createNewFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></button>
      <button class="icon-btn" title="New folder" onclick="createNewFolder()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></button>
      <button class="icon-btn" title="Upload files" onclick="uploadFiles()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
      <button class="icon-btn" title="Upload folder" onclick="uploadFolder()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="12 11 12 17"/><polyline points="9 14 12 11 15 14"/></svg></button>
      <button class="icon-btn" title="Download project" onclick="downloadProject()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    </div>
    <div id="file-tree"></div>
    <div id="sidebar-footer">
      <span class="user-email" id="user-display">Guest</span>
      <button id="btn-save" onclick="cloudSave()" title="Save to cloud">💾</button>
      <button id="btn-logout" onclick="doLogout()" title="Sign out">🚪</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="toolbar">
      <div id="tabs"></div>
      <div id="toolbar-actions">
        <button class="btn-sm" onclick="togglePreview()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Preview
        </button>
        <button class="btn-sm primary" onclick="openFullPreview()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          Full Preview
        </button>
      </div>
    </div>
    <div id="workspace">
      <div id="editor-pane">
        <div id="editor-container">
          <div id="line-numbers"></div>
          <textarea id="code-editor" class="has-lines" spellcheck="false" placeholder="Select a file to start editing..."></textarea>
        </div>
      </div>
      <div id="preview-pane">
        <div id="preview-header"><span class="dot"></span> Live Preview</div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
    <div id="statusbar">
      <span class="status-item" id="status-file">No file open</span>
      <span class="status-item" id="status-lang">—</span>
      <span class="status-item saving-indicator" id="status-save"></span>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div class="ctx-item" onclick="ctxAction('open')">📄 Open</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('rename')">✏️ Rename</div>
  <div class="ctx-item" onclick="ctxAction('duplicate')">📋 Duplicate</div>
  <div class="ctx-item" onclick="ctxAction('move')">📦 Move to...</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('download')">⬇️ Download</div>
  <div class="ctx-item" onclick="ctxAction('download-selected')" id="ctx-dl-selected">⬇️ Download selected</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxAction('delete')">🗑️ Delete</div>
  <div class="ctx-item danger" onclick="ctxAction('delete-selected')" id="ctx-del-selected">🗑️ Delete selected</div>
</div>

<!-- FULL PREVIEW -->
<div id="full-preview">
  <div id="full-preview-bar">
    <button class="btn-sm" onclick="closeFullPreview()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Close
    </button>
    <span style="flex:1;text-align:center;font-size:12px;color:var(--fg2)">Full Preview</span>
    <button class="btn-sm" onclick="refreshFullPreview()">🔄 Refresh</button>
  </div>
  <iframe id="full-preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<input type="file" id="file-input" multiple style="display:none" onchange="handleFileUpload(event)">
<input type="file" id="folder-input" webkitdirectory style="display:none" onchange="handleFolderUpload(event)">

<script>
/* ================================================================
   WEBFORGE IDE — Complete single-file web development environment
   Features: file tree, editor, preview, Firebase auth + cloud save,
   upload/download, multi-select, drag & drop, folders
   ================================================================ */

// ==================== FIREBASE CONFIG ====================
// Replace with your own Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyBwGadejXPfbuOvOw3ZedczvlLw7dkqOMg",
    authDomain: "mystudio-5200e.firebaseapp.com",
    projectId: "mystudio-5200e",
    storageBucket: "mystudio-5200e.firebasestorage.app",
    messagingSenderId: "564346253919",
    appId: "1:564346253919:web:b2591a99f8816ee2a761ea",
    measurementId: "G-BWHS1NK8QH"
  };

let firebaseReady = false;
let db = null;
let auth = null;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  firebaseReady = true;
} catch(e) {
  console.warn('Firebase init failed, cloud save disabled:', e);
}

// ==================== STATE ====================
let files = {}; // path -> { content, type:'file' } or { type:'folder' }
let openTabs = [];
let activeFile = null;
let selectedFiles = new Set();
let ctxTarget = null;
let previewVisible = true;
let isSignUp = false;
let isGuest = false;
let dragItem = null;
let unsavedTimer = null;

// Default project
const defaultFiles = {
  'index.html': { type:'file', content:'<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>My Project</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <div class="container">\n    <h1>Hello, World! 👋</h1>\n    <p>Start editing to see your changes live.</p>\n    <button id="btn" onclick="handleClick()">Click me</button>\n    <div id="output"></div>\n  </div>\n  <script src="app.js"><\/script>\n</body>\n</html>' },
  'style.css': { type:'file', content:'* {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nbody {\n  font-family: system-ui, sans-serif;\n  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);\n  min-height: 100vh;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: #fff;\n}\n\n.container {\n  text-align: center;\n  padding: 40px;\n}\n\nh1 {\n  font-size: 2.5rem;\n  margin-bottom: 12px;\n}\n\np {\n  color: rgba(255,255,255,.7);\n  margin-bottom: 24px;\n}\n\nbutton {\n  padding: 10px 24px;\n  border: 2px solid #58a6ff;\n  background: transparent;\n  color: #58a6ff;\n  border-radius: 8px;\n  font-size: 14px;\n  cursor: pointer;\n  transition: .2s;\n}\n\nbutton:hover {\n  background: #58a6ff;\n  color: #000;\n}\n\n#output {\n  margin-top: 16px;\n  font-size: 18px;\n}' },
  'app.js': { type:'file', content:'let count = 0;\n\nfunction handleClick() {\n  count++;\n  const output = document.getElementById("output");\n  output.textContent = "Clicked " + count + " time" + (count === 1 ? "" : "s") + "!";\n}\n\nconsole.log("App loaded!");' },
  'assets': { type:'folder' },
};

// ==================== AUTH ====================
function toggleAuthMode() {
  isSignUp = !isSignUp;
  document.getElementById('btn-login').textContent = isSignUp ? 'Sign Up' : 'Sign In';
  document.getElementById('btn-toggle-auth').textContent = isSignUp
    ? 'Already have an account? Sign in'
    : "Don't have an account? Sign up";
}

async function doLogin() {
  if (!firebaseReady) { doGuestMode(); return; }
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  try {
    if (isSignUp) {
      await auth.createUserWithEmailAndPassword(email, pass);
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
    }
    enterApp();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function doGuestMode() {
  isGuest = true;
  enterApp();
}

function doLogout() {
  if (firebaseReady && auth.currentUser) auth.signOut();
  isGuest = false;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const user = auth?.currentUser;
  document.getElementById('user-display').textContent = user ? user.email : 'Guest';

  // Load from cloud or use defaults
  if (user && firebaseReady) {
    await cloudLoad();
  } else {
    files = JSON.parse(JSON.stringify(defaultFiles));
  }
  renderTree();
  openFile('index.html');
}

// ==================== CLOUD SAVE/LOAD ====================
async function cloudSave() {
  if (!firebaseReady || !auth?.currentUser) return;
  const uid = auth.currentUser.uid;
  document.getElementById('status-save').textContent = 'Saving...';
  try {
    await db.collection('projects').doc(uid).set({
      files: JSON.stringify(files),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('status-save').textContent = '✓ Saved';
    setTimeout(() => { document.getElementById('status-save').textContent = ''; }, 2000);
  } catch(e) {
    document.getElementById('status-save').textContent = '✗ Save failed';
  }
}

async function cloudLoad() {
  if (!firebaseReady || !auth?.currentUser) return;
  const uid = auth.currentUser.uid;
  try {
    const doc = await db.collection('projects').doc(uid).get();
    if (doc.exists && doc.data().files) {
      files = JSON.parse(doc.data().files);
    } else {
      files = JSON.parse(JSON.stringify(defaultFiles));
    }
  } catch(e) {
    files = JSON.parse(JSON.stringify(defaultFiles));
  }
}

function scheduleAutoSave() {
  clearTimeout(unsavedTimer);
  unsavedTimer = setTimeout(() => cloudSave(), 3000);
}

// ==================== FILE TREE ====================
function getFileIcon(name, type) {
  if (type === 'folder') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/></svg>';
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
    css:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l8-4 8 4V2z"/></svg>',
    js:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 3H4a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1z"/><path d="M9 15V9"/><path d="M7 13h4"/></svg>',
    json:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  };
  return icons[ext] || '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
}

function getFileClass(name, type) {
  if (type === 'folder') return 'file-folder';
  const ext = name.split('.').pop().toLowerCase();
  const map = { html:'file-html', css:'file-css', js:'file-js', json:'file-json', png:'file-img', jpg:'file-img', jpeg:'file-img', gif:'file-img', svg:'file-img', md:'file-md' };
  return map[ext] || '';
}

function buildTree() {
  // Build a nested tree structure from flat paths
  const tree = { children: {}, type: 'folder', path: '' };
  const paths = Object.keys(files).sort((a, b) => {
    const aIsFolder = files[a].type === 'folder';
    const bIsFolder = files[b].type === 'folder';
    if (aIsFolder !== bIsFolder) return aIsFolder ? -1 : 1;
    return a.localeCompare(b);
  });
  for (const path of paths) {
    const parts = path.split('/');
    let node = tree;
    for (let i = 0; i < parts.length; i++) {
      if (!node.children) node.children = {};
      if (!node.children[parts[i]]) {
        node.children[parts[i]] = { children: {}, path: parts.slice(0, i+1).join('/') };
      }
      if (i === parts.length - 1) {
        node.children[parts[i]].type = files[path].type;
        node.children[parts[i]].path = path;
      }
      node = node.children[parts[i]];
    }
  }
  return tree;
}

// Track collapsed folders
const collapsedFolders = new Set();

function renderTree() {
  const treeEl = document.getElementById('file-tree');
  const tree = buildTree();
  treeEl.innerHTML = '';
  renderTreeNode(tree, treeEl, 0);
}

function renderTreeNode(node, parentEl, depth) {
  if (!node.children) return;
  const sorted = Object.entries(node.children).sort(([,a],[,b]) => {
    if (a.type === 'folder' && b.type !== 'folder') return -1;
    if (a.type !== 'folder' && b.type === 'folder') return 1;
    return 0;
  });
  for (const [name, child] of sorted) {
    const isFolder = child.type === 'folder';
    const isCollapsed = collapsedFolders.has(child.path);
    const div = document.createElement('div');
    div.className = 'tree-item ' + getFileClass(name, child.type);
    div.style.setProperty('--depth', depth);
    if (child.path === activeFile) div.classList.add('active');
    if (selectedFiles.has(child.path)) div.classList.add('selected');
    div.dataset.path = child.path;
    div.draggable = true;

    let chevron = '';
    if (isFolder) {
      chevron = '<span class="chevron' + (isCollapsed ? '' : ' open') + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg></span>';
    } else {
      chevron = '<span style="width:14px"></span>';
    }

    div.innerHTML = chevron + '<span class="icon">' + getFileIcon(name, child.type) + '</span><span class="name">' + name + '</span>';

    div.addEventListener('click', (e) => {
      if (e.ctrlKey || e.metaKey) {
        if (selectedFiles.has(child.path)) selectedFiles.delete(child.path);
        else selectedFiles.add(child.path);
        renderTree();
      } else if (isFolder) {
        if (isCollapsed) collapsedFolders.delete(child.path);
        else collapsedFolders.add(child.path);
        renderTree();
      } else {
        selectedFiles.clear();
        openFile(child.path);
      }
    });

    div.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ctxTarget = child.path;
      showContextMenu(e.pageX, e.pageY);
    });

    // Drag & drop
    div.addEventListener('dragstart', (e) => {
      dragItem = child.path;
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (isFolder && dragItem !== child.path) {
        div.classList.add('drop-target');
      }
    });
    div.addEventListener('dragleave', () => div.classList.remove('drop-target'));
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.classList.remove('drop-target');
      if (dragItem && isFolder && dragItem !== child.path && !child.path.startsWith(dragItem + '/')) {
        moveFile(dragItem, child.path);
      }
      dragItem = null;
    });

    parentEl.appendChild(div);

    if (isFolder && !isCollapsed && child.children) {
      renderTreeNode(child, parentEl, depth + 1);
    }
  }
}

// ==================== FILE OPERATIONS ====================
function openFile(path) {
  if (!files[path] || files[path].type === 'folder') return;
  activeFile = path;
  if (!openTabs.includes(path)) openTabs.push(path);
  const editor = document.getElementById('code-editor');
  editor.value = files[path].content || '';
  updateLineNumbers();
  renderTabs();
  renderTree();
  updateStatus();
  updatePreview();
}

function closeTab(path, e) {
  if (e) e.stopPropagation();
  openTabs = openTabs.filter(t => t !== path);
  if (activeFile === path) {
    activeFile = openTabs[openTabs.length - 1] || null;
    if (activeFile) openFile(activeFile);
    else {
      document.getElementById('code-editor').value = '';
      updateLineNumbers();
      updateStatus();
    }
  }
  renderTabs();
  renderTree();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = openTabs.map(path => {
    const name = path.split('/').pop();
    return '<div class="tab' + (path === activeFile ? ' active' : '') + '" onclick="openFile(\''+path+'\')">'
      + '<span>' + name + '</span>'
      + '<span class="close" onclick="closeTab(\''+path+'\', event)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>'
      + '</div>';
  }).join('');
}

function createNewFile(parentPath) {
  const parent = parentPath ? parentPath + '/' : '';
  let name = prompt('File name:', 'untitled.html');
  if (!name) return;
  const path = parent + name;
  if (files[path]) { alert('File already exists'); return; }
  files[path] = { type: 'file', content: '' };
  renderTree();
  openFile(path);
  scheduleAutoSave();
}

function createNewFolder(parentPath) {
  const parent = parentPath ? parentPath + '/' : '';
  let name = prompt('Folder name:', 'new-folder');
  if (!name) return;
  const path = parent + name;
  if (files[path]) { alert('Folder already exists'); return; }
  files[path] = { type: 'folder' };
  renderTree();
  scheduleAutoSave();
}

function renameFile(path) {
  const oldName = path.split('/').pop();
  const newName = prompt('Rename to:', oldName);
  if (!newName || newName === oldName) return;
  const parentPath = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';
  const newPath = parentPath ? parentPath + '/' + newName : newName;
  if (files[newPath]) { alert('Name already exists'); return; }

  // Rename file and all children if folder
  const updates = {};
  for (const [p, data] of Object.entries(files)) {
    if (p === path || p.startsWith(path + '/')) {
      const suffix = p.substring(path.length);
      updates[newPath + suffix] = data;
      delete files[p];
    }
  }
  Object.assign(files, updates);

  // Update tabs and active
  openTabs = openTabs.map(t => t === path ? newPath : t.startsWith(path + '/') ? newPath + t.substring(path.length) : t);
  if (activeFile === path) activeFile = newPath;
  else if (activeFile?.startsWith(path + '/')) activeFile = newPath + activeFile.substring(path.length);

  renderTree();
  renderTabs();
  scheduleAutoSave();
}

function duplicateFile(path) {
  const ext = path.includes('.') ? '.' + path.split('.').pop() : '';
  const base = path.includes('.') ? path.substring(0, path.lastIndexOf('.')) : path;
  let newPath = base + '-copy' + ext;
  let i = 2;
  while (files[newPath]) { newPath = base + '-copy-' + i + ext; i++; }

  if (files[path].type === 'folder') {
    files[newPath] = { type: 'folder' };
    for (const [p, data] of Object.entries(files)) {
      if (p.startsWith(path + '/')) {
        files[newPath + p.substring(path.length)] = JSON.parse(JSON.stringify(data));
      }
    }
  } else {
    files[newPath] = JSON.parse(JSON.stringify(files[path]));
  }
  renderTree();
  scheduleAutoSave();
}

function moveFile(sourcePath, targetFolder) {
  const name = sourcePath.split('/').pop();
  const newPath = targetFolder + '/' + name;
  if (files[newPath]) { alert('A file with that name already exists in the target folder'); return; }

  const updates = {};
  for (const [p, data] of Object.entries(files)) {
    if (p === sourcePath || p.startsWith(sourcePath + '/')) {
      const suffix = p.substring(sourcePath.length);
      updates[newPath + suffix] = data;
      delete files[p];
    }
  }
  Object.assign(files, updates);

  openTabs = openTabs.map(t => {
    if (t === sourcePath) return newPath;
    if (t.startsWith(sourcePath + '/')) return newPath + t.substring(sourcePath.length);
    return t;
  });
  if (activeFile === sourcePath) activeFile = newPath;
  else if (activeFile?.startsWith(sourcePath + '/')) activeFile = newPath + activeFile.substring(sourcePath.length);

  renderTree();
  renderTabs();
  scheduleAutoSave();
}

function moveFilePrompt(path) {
  const folders = Object.keys(files).filter(p => files[p].type === 'folder' && p !== path);
  folders.unshift('(root)');
  const target = prompt('Move to folder:\n' + folders.join('\n'), folders[0]);
  if (!target) return;
  const dest = target === '(root)' ? path.split('/').pop() : target + '/' + path.split('/').pop();
  if (dest === path) return;
  const name = path.split('/').pop();
  const targetFolder = target === '(root)' ? '' : target;

  const updates = {};
  for (const [p, data] of Object.entries(files)) {
    if (p === path || p.startsWith(path + '/')) {
      const suffix = p.substring(path.length);
      const newP = targetFolder ? targetFolder + '/' + name + suffix : name + suffix;
      updates[newP] = data;
      delete files[p];
    }
  }
  Object.assign(files, updates);
  renderTree();
  scheduleAutoSave();
}

function deleteFile(path) {
  if (!confirm('Delete "' + path + '"?')) return;
  for (const p of Object.keys(files)) {
    if (p === path || p.startsWith(path + '/')) {
      delete files[p];
      openTabs = openTabs.filter(t => t !== p);
      if (activeFile === p) activeFile = null;
    }
  }
  if (!activeFile && openTabs.length) openFile(openTabs[openTabs.length - 1]);
  renderTree();
  renderTabs();
  updateStatus();
  scheduleAutoSave();
}

function deleteSelected() {
  if (!selectedFiles.size) return;
  if (!confirm('Delete ' + selectedFiles.size + ' selected items?')) return;
  for (const path of selectedFiles) {
    for (const p of Object.keys(files)) {
      if (p === path || p.startsWith(path + '/')) {
        delete files[p];
        openTabs = openTabs.filter(t => t !== p);
        if (activeFile === p) activeFile = null;
      }
    }
  }
  selectedFiles.clear();
  if (!activeFile && openTabs.length) openFile(openTabs[openTabs.length - 1]);
  renderTree();
  renderTabs();
  scheduleAutoSave();
}

// ==================== UPLOAD ====================
function uploadFiles() { document.getElementById('file-input').click(); }
function uploadFolder() { document.getElementById('folder-input').click(); }

function handleFileUpload(e) {
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const isText = file.type.startsWith('text/') || /\.(html|css|js|json|md|txt|xml|svg|yml|yaml|toml|ini|cfg|env|sh|bat|py|rb|php|java|c|cpp|h|rs|go|ts|tsx|jsx|vue|svelte)$/i.test(file.name);
      files[file.name] = { type: 'file', content: isText ? ev.target.result : btoa(ev.target.result) };
      renderTree();
      scheduleAutoSave();
    };
    const isText = file.type.startsWith('text/') || /\.(html|css|js|json|md|txt|xml|svg)$/i.test(file.name);
    if (isText) reader.readAsText(file);
    else reader.readAsBinaryString(file);
  }
  e.target.value = '';
}

function handleFolderUpload(e) {
  for (const file of e.target.files) {
    const path = file.webkitRelativePath || file.name;
    // Ensure parent folders exist
    const parts = path.split('/');
    for (let i = 1; i < parts.length; i++) {
      const folderPath = parts.slice(0, i).join('/');
      if (!files[folderPath]) files[folderPath] = { type: 'folder' };
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      files[path] = { type: 'file', content: ev.target.result };
      renderTree();
      scheduleAutoSave();
    };
    reader.readAsText(file);
  }
  e.target.value = '';
}

// ==================== DOWNLOAD ====================
async function downloadSingle(path) {
  if (files[path].type === 'folder') {
    return downloadPaths(Object.keys(files).filter(p => p === path || p.startsWith(path + '/')));
  }
  const blob = new Blob([files[path].content || ''], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = path.split('/').pop();
  a.click();
  URL.revokeObjectURL(a.href);
}

async function downloadPaths(paths) {
  const zip = new JSZip();
  for (const p of paths) {
    if (files[p] && files[p].type === 'file') {
      zip.file(p, files[p].content || '');
    }
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'download.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function downloadProject() {
  const zip = new JSZip();
  for (const [p, data] of Object.entries(files)) {
    if (data.type === 'file') zip.file(p, data.content || '');
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'project.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadSelected() {
  if (!selectedFiles.size) return;
  const paths = [];
  for (const sel of selectedFiles) {
    paths.push(sel);
    // Include children of selected folders
    for (const p of Object.keys(files)) {
      if (p.startsWith(sel + '/') && !paths.includes(p)) paths.push(p);
    }
  }
  downloadPaths(paths);
}

// ==================== CONTEXT MENU ====================
function showContextMenu(x, y) {
  const menu = document.getElementById('context-menu');
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('show');
  // Show/hide multi-select options
  document.getElementById('ctx-dl-selected').style.display = selectedFiles.size > 1 ? '' : 'none';
  document.getElementById('ctx-del-selected').style.display = selectedFiles.size > 1 ? '' : 'none';
}
document.addEventListener('click', () => document.getElementById('context-menu').classList.remove('show'));

function ctxAction(action) {
  document.getElementById('context-menu').classList.remove('show');
  if (!ctxTarget && !['download-selected','delete-selected'].includes(action)) return;
  switch(action) {
    case 'open': if (files[ctxTarget]?.type === 'file') openFile(ctxTarget); break;
    case 'rename': renameFile(ctxTarget); break;
    case 'duplicate': duplicateFile(ctxTarget); break;
    case 'move': moveFilePrompt(ctxTarget); break;
    case 'download': downloadSingle(ctxTarget); break;
    case 'download-selected': downloadSelected(); break;
    case 'delete': deleteFile(ctxTarget); break;
    case 'delete-selected': deleteSelected(); break;
  }
}

// ==================== EDITOR ====================
const editor = document.getElementById('code-editor');
editor.addEventListener('input', () => {
  if (activeFile && files[activeFile]) {
    files[activeFile].content = editor.value;
    updateLineNumbers();
    updatePreview();
    scheduleAutoSave();
  }
});

editor.addEventListener('scroll', () => {
  document.getElementById('line-numbers').style.transform = 'translateY(' + (-editor.scrollTop) + 'px)';
});

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    editor.dispatchEvent(new Event('input'));
  }
  // Ctrl+S
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    cloudSave();
  }
});

function updateLineNumbers() {
  const lines = (editor.value || '').split('\n').length;
  const html = Array.from({ length: lines }, (_, i) => '<div>' + (i + 1) + '</div>').join('');
  document.getElementById('line-numbers').innerHTML = html;
}

function updateStatus() {
  document.getElementById('status-file').textContent = activeFile || 'No file open';
  const ext = activeFile ? activeFile.split('.').pop().toUpperCase() : '—';
  document.getElementById('status-lang').textContent = ext;
}

// ==================== PREVIEW ====================
function buildPreviewHTML() {
  const htmlFile = files['index.html'];
  if (!htmlFile || htmlFile.type !== 'file') return '<html><body><p style="padding:20px;font-family:sans-serif;color:#888">No index.html found</p></body></html>';
  let html = htmlFile.content || '';

  // Inline CSS files referenced via <link>
  html = html.replace(/<link[^>]+href="([^"]+\.css)"[^>]*>/gi, (match, href) => {
    if (files[href] && files[href].type === 'file') {
      return '<style>' + files[href].content + '</style>';
    }
    return match;
  });

  // Inline JS files referenced via <script src>
  html = html.replace(/<script[^>]+src="([^"]+\.js)"[^>]*><\/script>/gi, (match, src) => {
    if (files[src] && files[src].type === 'file') {
      return '<script>' + files[src].content + '<\/script>';
    }
    return match;
  });

  return html;
}

function updatePreview() {
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = buildPreviewHTML();
}

function togglePreview() {
  const pane = document.getElementById('preview-pane');
  previewVisible = !previewVisible;
  pane.classList.toggle('hidden', !previewVisible);
  if (previewVisible) updatePreview();
}

function openFullPreview() {
  document.getElementById('full-preview').classList.add('show');
  document.getElementById('full-preview-frame').srcdoc = buildPreviewHTML();
}

function closeFullPreview() {
  document.getElementById('full-preview').classList.remove('show');
}

function refreshFullPreview() {
  document.getElementById('full-preview-frame').srcdoc = buildPreviewHTML();
}

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', (e) => {
  // Escape to deselect
  if (e.key === 'Escape') {
    selectedFiles.clear();
    renderTree();
    document.getElementById('context-menu').classList.remove('show');
  }
  // Ctrl+Shift+E: focus file tree
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'E') {
    e.preventDefault();
    document.getElementById('file-tree').focus();
  }
});

// Drop on root area (sidebar file tree)
const fileTree = document.getElementById('file-tree');
fileTree.addEventListener('dragover', (e) => e.preventDefault());
fileTree.addEventListener('drop', (e) => {
  e.preventDefault();
  if (dragItem) {
    // Move to root
    const name = dragItem.split('/').pop();
    if (dragItem.includes('/') && !files[name]) {
      const updates = {};
      for (const [p, data] of Object.entries(files)) {
        if (p === dragItem || p.startsWith(dragItem + '/')) {
          const suffix = p.substring(dragItem.length);
          updates[name + suffix] = data;
          delete files[p];
        }
      }
      Object.assign(files, updates);
      renderTree();
      scheduleAutoSave();
    }
    dragItem = null;
  }
});

// ==================== INIT ====================
// Check if already logged in
if (firebaseReady) {
  auth.onAuthStateChanged((user) => {
    if (user) enterApp();
  });
}

updateLineNumbers();
</script>
