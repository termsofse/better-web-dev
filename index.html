<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - WebDev Studio</title>
    <style>
        :root {
            --bg: #0f1117; --card: #14161f; --border: rgba(255,255,255,0.1);
            --text: #cdd6f4; --accent: #89b4fa; --btn: #1e66f5;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; padding: 40px; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .project-card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            text-decoration: none; color: inherit;
        }
        .project-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        button { 
            background: var(--btn); color: white; border: none; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        #login-screen { text-align: center; margin-top: 100px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>WebDev Studio</h1>
    <p>Sign in to manage your cloud projects</p>
    <button id="btn-login">Sign in with Google</button>
</div>

<div id="dashboard" class="hidden">
    <div class="container">
        <div class="header">
            <h1>My Projects</h1>
            <div style="display:flex; gap: 10px;">
                <button onclick="createNewProject()">+ New Project</button>
                <button id="btn-logout" style="background:transparent; border: 1px solid var(--border)">Logout</button>
            </div>
        </div>
        <div id="project-list" class="project-grid">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBwGadejXPfbuOvOw3ZedczvlLw7dkqOMg",
        authDomain: "mystudio-5200e.firebaseapp.com",
        projectId: "mystudio-5200e",
        storageBucket: "mystudio-5200e.firebasestorage.app",
        messagingSenderId: "564346253919",
        appId: "1:564346253919:web:b2591a99f8816ee2a761ea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // UI Elements
    const loginScreen = document.getElementById('login-screen');
    const dashboard = document.getElementById('dashboard');
    const projectList = document.getElementById('project-list');

    // Handle Auth
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginScreen.classList.add('hidden');
            dashboard.classList.remove('hidden');
            loadProjects(user.uid);
        } else {
            loginScreen.classList.remove('hidden');
            dashboard.classList.add('hidden');
        }
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // Create Project
    window.createNewProject = async () => {
        const name = prompt("Project Name:", "New Site");
        if (!name) return;

        const docRef = await addDoc(collection(db, "projects"), {
            name: name,
            owner: auth.currentUser.uid,
            createdAt: serverTimestamp(),
            files: [
                { id: 'f1', name: 'index.html', type: 'file', content: '<h1>New Project</h1>' }
            ]
        });
        window.location.href = `editor.html?id=${docRef.id}`;
    };

    // Load Projects
    async function loadProjects(uid) {
        projectList.innerHTML = '';
        const q = query(collection(db, "projects"), where("owner", "==", uid));
        const querySnapshot = await getDocs(q);
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('a');
            card.className = 'project-card';
            card.href = `editor.html?id=${doc.id}`;
            card.innerHTML = `<h3>${data.name}</h3><p style="font-size:12px; color:gray;">Click to edit</p>`;
            projectList.appendChild(card);
        });
    }
</script>
</body>
</html>
